# @package _global_

exp_name: resnet50_vicreg

defaults:
  - /base
  - /data: mini_imagenet
  - /model: resnet50
  - /method: vicreg
  - /trainer: single_gpu
  - /trainer/checkpoint  # <-- add this


probe:
  enabled: True
  every_n_epochs: 1
  max_epochs: 100            # probe training epochs (keep small)
  lr: 0.001
  weight_decay: 0.0
  max_train_batches: 200   # cap for speed (debug-friendly)
  max_val_batches: 50
  batch_size: 256


cdnv:
  every_n_epochs: 1
  max_train_batches:  200
  max_val_batches: 50
  num_classes: 100  
  enabled: true
  compute_on_train: true
  compute_on_val: true


viz:
  enabled: False
  every_n_epochs: 100
  num_images: 8
  tag: viz/mae_recon
