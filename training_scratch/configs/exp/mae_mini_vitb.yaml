# @package _global_

exp_name: stage1_mae_mini_vitb16

defaults:
  - /base
  - /data: mini_imagenet
  - /model: vit_b
  - /method: mae
  - /trainer: single_gpu
  - /trainer/checkpoint  # <-- add this

probe:
  enabled: false
  every_n_epochs: 1
  max_epochs: 100            # probe training epochs (keep small)
  lr: 0.001
  weight_decay: 0.0
  max_train_batches: 200   # cap for speed (debug-friendly)
  max_val_batches: 50
  batch_size: 256

viz:
  enabled: False
  every_n_epochs: 100
  num_images: 8
  tag: viz/mae_recon
