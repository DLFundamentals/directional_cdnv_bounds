experiment_name: "ijepa/imagenet"
method_type: "ijepa"
supervision: "SSL"

dataset:
  name: "mini_imagenet"
  path: "./data/"
  num_output_classes: 100 

training:
  batch_size: 128 
  num_epochs: 200  
  lr: 0.001  
  augmentations_type: "imagenet"
  augment_both: True
  save_every: 25
  log_every: 10
  track_performance: False
  multi_gpu: True
  world_size: 2

model:
  encoder_type: "ijepa"
  pretrained: False
  context_encoder_depth: 12
  target_encoder_depth: 12
  predictor_depth: 6
  embed_dim: 768
  ema_momentum: 0.996
  image_size: 84
  patch_size: 7 



loss:
  temperature: 0.1  

evaluation:
  K: [5, 10, 20]
  checkpoints_dir: "experiments/ijepa/miniimagenet/checkpoints/"  
  perform_knn: False
  perform_cdnv: True
  perform_nccc: True
  perform_linear: True
  perform_tsne: False

linear:
  batch_size: 128
  num_epochs: 100  
  num_output_classes: 100  
  augment_both: False
  top_lr: 3e-4
  momentum: 0.9
  weight_decay: 5e-4
  track_performance: True
  save_every: 10