experiment_name: "clip/mini_imagenet"
method_type: "clip"
supervision: "SSL"
dataset:
  name: "mini_imagenet"
  path: "./data/"
  num_output_classes: 100
training:
  batch_size: 896
  num_epochs: 2501  
  lr: 0.001  
  augmentations_type: "imagenet"
  augment_both: True
  save_every: 10
  log_every: 10
  track_performance: False
  multi_gpu: True
  world_size: 2
model:
  encoder_type: "clip"
  pretrained: True
  vision_layers: 12
  vision_width: 768
  vision_patch_size: 32
  image_size: 224
  projection_dim: 512
  temperature: 0.07
loss:
  temperature: 0.07  
evaluation:
  checkpoints_dir: "experiments/clip/mini_imagenet/checkpoints/"  
  perform_knn: False
  perform_cdnv: True
  perform_nccc: True
  perform_linear: True
  perform_tsne: False
linear:
  batch_size: 128
  num_epochs: 100  
  num_output_classes: 100  
  augment_both: False
  top_lr: 3e-4
  momentum: 0.9
  weight_decay: 5e-4
  track_performance: True
  save_every: 10